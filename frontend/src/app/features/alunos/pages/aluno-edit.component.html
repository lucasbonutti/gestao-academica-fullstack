<app-shell (logout)="sair()">
  <div class="app-page">
    <div class="page-top">
      <div>
        <h1>Editar Aluno</h1>
        <p>Atualize os dados do aluno selecionado.</p>
      </div>

      <div class="page-actions">
        <button class="btn-secondary" routerLink="/alunos">Voltar para alunos</button>
      </div>
    </div>

    <div *ngIf="loading" class="info-box">Carregando...</div>

    <section class="form-card app-card" *ngIf="!loading">
      <form (ngSubmit)="salvar()">
        <div class="form-grid">
          <div class="form-group">
            <label for="matricula">Matrícula</label>
            <input
              id="matricula"
              name="matricula"
              type="text"
              [(ngModel)]="matricula"
              required
              maxlength="20"
            />
          </div>

          <div class="form-group">
            <label for="nomeCompleto">Nome completo</label>
            <input
              id="nomeCompleto"
              name="nomeCompleto"
              type="text"
              [(ngModel)]="nomeCompleto"
              required
              maxlength="100"
            />
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-box">
          {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="success-box">
          {{ successMessage }}
        </div>

        <div class="page-actions" style="margin-top: 18px;">
          <button class="btn-success" type="submit" [disabled]="loading">
            {{ loading ? 'Salvando...' : 'Salvar Alterações' }}
          </button>

          <button class="btn-secondary" type="button" routerLink="/alunos">
            Cancelar
          </button>
        </div>
      </form>
    </section>
  </div>
</app-shell>
