<app-shell (logout)="sair()">
  <div class="app-page">
    <div class="page-top">
      <div>
        <h1>Nova IES</h1>
        <p>Cadastre uma nova instituição de ensino superior.</p>
      </div>

      <div class="page-actions">
        <a routerLink="/ies" class="btn-secondary">Voltar para IES</a>
      </div>
    </div>

    <section class="form-card app-card">
      <div *ngIf="errorMessage" class="alert error">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert success">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="salvar()">
        <div class="form-grid">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input
              id="nome"
              name="nome"
              type="text"
              [(ngModel)]="nome"
              required
            />
          </div>

          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input
              id="endereco"
              name="endereco"
              type="text"
              [(ngModel)]="endereco"
              required
            />
          </div>

          <div class="form-group full-width telefone-group">
            <label for="telefone">Telefone</label>
            <input
              id="telefone"
              name="telefone"
              type="text"
              [value]="telefone"
              (input)="onTelefoneInput($event)"
              placeholder="Ex.: (71)91234-5678"
              maxlength="14"
              required
            />
            <small class="form-help">Informe o telefone com DDD.</small>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-success" [disabled]="loading">
            {{ loading ? 'Salvando...' : 'Salvar IES' }}
          </button>

          <a routerLink="/ies" class="btn-secondary-outline">
            Cancelar
          </a>
        </div>
      </form>
    </section>
  </div>
</app-shell>
