services:
  postgres:
    image: postgres:17-alpine
    container_name: monitoria-postgres
    environment:
      POSTGRES_DB: monitoria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitoria_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitoria-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: monitoria_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: minha-chave-jwt
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
