spring:
  application:
    name: monitoria-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  datasource:
    url: jdbc:postgresql://localhost:5433/${DB_NAME:monitoria_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Pisa204.}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

api:
  security:
    token:
      secret: ${JWT_SECRET:12345678}
